services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dbmanagement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "18080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/dbmanagement
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
