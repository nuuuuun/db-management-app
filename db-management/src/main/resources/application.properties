spring.application.name=db-management

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dbmanagement}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

jwt.secret=${JWT_SECRET:db-management-jwt-secret-key-for-dev-only-2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.init.password=${INIT_PASSWORD:password123}
